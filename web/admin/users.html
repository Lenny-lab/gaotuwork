<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>用户管理 · ClassMind</title>
  <link rel="stylesheet" href="/static/role.css">
  <style>
    :root{--accent:#f79009;--accent-soft:#fff7ed;--accent-rgb:247,144,9}
    .mapping-layout{display:grid;grid-template-columns:minmax(320px,.8fr) minmax(0,1.7fr);gap:20px}
    .field input{width:100%;padding:12px 14px;border:1px solid #d0d5dd;border-radius:12px;background:#fff;font:inherit;transition:border-color .18s ease,box-shadow .18s ease}
    .field input:focus,.field select:focus{border-color:var(--accent);outline:0;box-shadow:0 0 0 4px rgba(var(--accent-rgb),.12)}
    .privacy-hint{font-size:12px;color:var(--muted);line-height:1.7;margin:0}
    .status-pending{color:#b54708}.status-bound{color:#067647}
    body[data-view="admin-users"]{
      min-height:100vh;
      background:radial-gradient(circle at 8% 0,rgba(219,231,255,.92) 0,transparent 34%),radial-gradient(circle at 94% 7%,rgba(220,252,231,.8) 0,transparent 30%),#f7f8fb;
    }
    body[data-view="admin-users"] .shell{grid-template-columns:252px minmax(0,1fr)}
    body[data-view="admin-users"] .sidebar{
      position:sticky;top:0;z-index:20;height:100vh;padding:30px 20px 24px;color:var(--ink);
      background:rgba(255,255,255,.9);border-right:1px solid rgba(228,231,236,.92);
      box-shadow:14px 0 40px rgba(16,24,40,.055);backdrop-filter:blur(18px)
    }
    body[data-view="admin-users"] .brand{margin:0 10px 28px;color:#101828;font-size:23px}
    body[data-view="admin-users"] .brand span{color:var(--accent)}
    body[data-view="admin-users"] .identity{
      margin:0 4px 24px;padding:16px;color:var(--ink);background:linear-gradient(145deg,var(--accent-soft),rgba(255,255,255,.96));
      border:1px solid rgba(var(--accent-rgb),.18);border-radius:16px;box-shadow:0 10px 26px rgba(var(--accent-rgb),.08)
    }
    body[data-view="admin-users"] .identity small{color:var(--muted)}
    body[data-view="admin-users"] .nav{gap:8px}
    body[data-view="admin-users"] .nav a{color:#475467;border:1px solid transparent;border-radius:12px;font-weight:650;transition:.18s}
    body[data-view="admin-users"] .nav a:hover{color:#b54708;background:rgba(var(--accent-rgb),.06);transform:translateX(2px)}
    body[data-view="admin-users"] .nav a.active{color:#b54708;background:var(--accent-soft);border-color:rgba(var(--accent-rgb),.16);box-shadow:inset 3px 0 0 var(--accent)}
    body[data-view="admin-users"] .logout{margin:24px 4px 0;padding:11px 14px;color:#b93815;background:#fff4ed;border:1px solid #ffd6ae;border-radius:11px;text-align:center;font-weight:700}
    body[data-view="admin-users"] .main{max-width:1480px;padding:48px 52px 68px}
    body[data-view="admin-users"] .title{margin:10px 0 12px;color:#101828;font-size:36px;letter-spacing:-.035em}
    body[data-view="admin-users"] .subtitle{max-width:920px;line-height:1.75;margin-bottom:32px}
    body[data-view="admin-users"] .card,body[data-view="admin-users"] .table-wrap{background:rgba(255,255,255,.94);border-radius:20px;box-shadow:0 12px 34px rgba(16,24,40,.07)}
    body[data-view="admin-users"] .card{border-top:3px solid var(--accent)}
    body[data-view="admin-users"] .btn{padding:13px 20px;border-radius:12px;box-shadow:0 9px 22px rgba(var(--accent-rgb),.22)}
    @media(max-width:980px){.mapping-layout{grid-template-columns:1fr}}
    @media(max-width:800px){
      body[data-view="admin-users"] .shell{display:block}
      body[data-view="admin-users"] .sidebar{position:relative;height:auto;min-height:auto;padding:18px 16px 15px;border-right:0;border-bottom:1px solid var(--line)}
      body[data-view="admin-users"] .brand{margin:0 4px 14px;font-size:21px}
      body[data-view="admin-users"] .nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px}
      body[data-view="admin-users"] .nav a{flex:0 0 auto;white-space:nowrap}
      body[data-view="admin-users"] .main{padding:30px 18px 50px}
      body[data-view="admin-users"] .title{font-size:30px}
    }
  </style>
</head>
<body data-view="admin-users">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">Class<span>Mind</span></div>
      <div class="identity"><strong data-user-name>加载中</strong><small><span data-user-role>教务</span> · 管理空间</small></div>
      <nav class="nav">
        <a href="/admin/dashboard">决策驾驶舱</a><a href="/schedule.html">智能排课</a><a href="/reschedule.html">调课中心</a><a href="/resources.html">资源概览</a><a href="/bitable.html">飞书多维表格</a><a class="active" href="/admin/users">用户管理</a><a href="/portal">三角色门户</a>
      </nav>
      <a class="logout" href="/auth/logout">退出登录</a>
    </aside>
    <main class="main">
      <div class="eyebrow">Feishu identity binding</div>
      <h1 class="title">账号与角色映射</h1>
      <p class="subtitle">教务输入成员手机号，服务端向飞书查询 Open ID，并绑定到已预置的学生、教师或教务业务用户。</p>
      <div class="mapping-layout">
        <section class="card form">
          <h2>通过手机号绑定飞书账号</h2>
          <form id="binding-form">
            <div class="field"><label for="binding-user">ClassMind 业务用户</label><select id="binding-user" required><option value="">正在加载用户…</option></select></div>
            <div class="field"><label for="binding-mobile">飞书绑定手机号</label><input id="binding-mobile" type="tel" inputmode="tel" autocomplete="off" placeholder="例如：13812345678" required></div>
            <button class="btn" type="submit">查询飞书并完成绑定</button>
          </form>
          <p class="privacy-hint">手机号只用于本次服务端查询，不写入 users.json、不显示在列表中；系统仅保存飞书返回的 Open ID。</p>
          <div id="binding-notice" class="notice"></div>
        </section>
        <section><div id="content" class="empty">正在加载用户映射…</div></section>
      </div>
    </main>
  </div>
  <script src="/static/role.js"></script>
</body>
</html>
