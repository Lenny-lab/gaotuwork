services:
  - type: web
    name: classmind-feishu
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    # 用户映射采用原子 JSON 写入；单 worker 避免两个进程同时覆盖绑定结果。
    startCommand: gunicorn -w 1 -k gthread --threads 4 -b 0.0.0.0:$PORT app:app --timeout 120
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: FEISHU_HOST
        value: https://open.feishu.cn
      - key: PUBLIC_BASE_URL
        value: https://classmind-feishu.onrender.com
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DEMO_LOGIN_ENABLED
        value: "0"
      # Secret JSON: {"U_S001":"...","U_T001":"..."}; never commit real mobiles.
      - key: FEISHU_MOBILE_BINDINGS
        sync: false
      - key: FEISHU_ENCRYPT_KEY
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: BITABLE_APP_TOKEN
        sync: false
      - key: BITABLE_TABLE_ID
        sync: false
