</text>
<rect x="780" y="500" width="330" height="86" rx="14" fill="#EAF8F3" stroke="#20A875" stroke-width="2"/>
<circle cx="808" cy="528" r="17" fill="#FF5A1F"/><text x="808" y="534" font-size="15" fill="white" font-weight="700" text-anchor="middle">80</text>
<text x="834" y="537" font-size="18" fill="#202733" font-weight="700" text-anchor="start" class="">审计分支</text>
<text x="945.0" y="570" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
