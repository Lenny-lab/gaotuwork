  <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#FF5A1F"/></marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1D2939" flood-opacity="0.10"/></filter>
  <style>text{font-family:'Microsoft YaHei','Noto Sans CJK SC','PingFang SC',Arial,sans-serif} .title{font-weight:700;fill:#202733} .muted{fill:#667085} .label{font-weight:600;fill:#202733} .small{font-size:18px;fill:#667085}</style>
</defs>
<rect width="100%" height="100%" fill="#FFFFFF"/>
<rect x="0" y="0" width="12" height="900" fill="#FF5A1F"/>
<text x="70" y="74" font-size="34" class="title">智能排课业务闭环</text>
<text x="70" y="108" font-size="18" class="muted">从数据准备到发布、调课与持续复盘的端到端流程</text>
