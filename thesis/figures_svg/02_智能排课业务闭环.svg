<circle cx="1248" cy="283" r="17" fill="#FF5A1F"/><text x="1248" y="289" font-size="15" fill="white" font-weight="700" text-anchor="middle">6</text>
<text x="1274" y="292" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">动态调课</text>
<text x="1305.0" y="325" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
