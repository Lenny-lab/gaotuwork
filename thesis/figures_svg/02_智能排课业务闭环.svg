</text>
<path d="M615,405 L495,498" fill="none" stroke="#356AE6" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="8 6"/>
<rect x="500.0" y="425.5" width="110" height="25" rx="12" fill="white"/><text x="555.0" y="443.5" font-size="14" fill="#667085" text-anchor="middle">无解</text>
<path d="M1075,405 L945,498" fill="none" stroke="#20A875" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="8 6"/>
<rect x="955.0" y="425.5" width="110" height="25" rx="12" fill="white"/><text x="1010.0" y="443.5" font-size="14" fill="#667085" text-anchor="middle">发布</text>
<rect x="590" y="720" width="260" height="36" rx="18" fill="#FFF1EA"/><text x="720.0" y="744" font-size="15" fill="#FF5A1F" font-weight="600" text-anchor="middle">可计算 · 可解释 · 可协同</text>
<text x="1370" y="865" text-anchor="end" font-size="14" fill="#98A2B3">ClassMind · 高途智能排课脑</text></svg>