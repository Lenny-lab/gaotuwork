<text x="720" y="625" font-size="18" fill="#356AE6" font-weight="700" text-anchor="middle" class="">版本记录与反馈回流</text>
<rect x="330" y="500" width="330" height="86" rx="14" fill="#EDF3FF" stroke="#356AE6" stroke-width="2"/>
<circle cx="358" cy="528" r="17" fill="#FF5A1F"/><text x="358" y="534" font-size="15" fill="white" font-weight="700" text-anchor="middle">70</text>
<text x="384" y="537" font-size="18" fill="#202733" font-weight="700" text-anchor="start" class="">异常分支</text>
<text x="495.0" y="570" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
