<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#202733"/></marker>
  <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#FF5A1F"/></marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1D2939" flood-opacity="0.10"/></filter>
  <style>text{font-family:'Microsoft YaHei','Noto Sans CJK SC','PingFang SC',Arial,sans-serif} .title{font-weight:700;fill:#202733} .muted{fill:#667085} .label{font-weight:600;fill:#202733} .small{font-size:18px;fill:#667085}</style>
</defs>
<rect width="100%" height="100%" fill="#FFFFFF"/>
<rect x="0" y="0" width="12" height="900" fill="#FF5A1F"/>
<text x="70" y="74" font-size="34" class="title">最小影响调课算法</text>
<text x="70" y="108" font-size="18" class="muted">教师请假后锁定未受影响课程，以课程变更数为最高优先级局部重排</text>
<line x1="70" y1="134" x2="1370" y2="134" stroke="#D9E0EA" stroke-width="2"/>

<rect x="70" y="245" width="170" height="145" rx="14" fill="#FFF1EA" stroke="#FF5A1F" stroke-width="2" filter="url(#shadow)"/>
<circle cx="98" cy="273" r="17" fill="#FF5A1F"/><text x="98" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">1</text>
<text x="124" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">接收请假</text>
<text x="155.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="155.0" dy="0">教师 t*</tspan>
<tspan x="155.0" dy="25">时段 s*</tspan>
</text>
<path d="M240,317 L292,317" fill="none" stroke="#202733" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="300" y="245" width="170" height="145" rx="14" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="2" filter="url(#shadow)"/>
<circle cx="328" cy="273" r="17" fill="#FF5A1F"/><text x="328" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">2</text>
<text x="354" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">求解基线</text>
<text x="385.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="385.0" dy="0">balanced</tspan>
<tspan x="385.0" dy="25">得到 S₀</tspan>
</text>
<path d="M470,317 L522,317" fill="none" stroke="#202733" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="530" y="245" width="170" height="145" rx="14" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="2" filter="url(#shadow)"/>
<circle cx="558" cy="273" r="17" fill="#FF5A1F"/><text x="558" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">3</text>
<text x="584" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">注入新约束</text>
<text x="615.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="615.0" dy="0">unavailable</tspan>
<tspan x="615.0" dy="25">加入 s*</tspan>
</text>
<path d="M700,317 L752,317" fill="none" stroke="#202733" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="760" y="245" width="170" height="145" rx="14" fill="#FFF1EA" stroke="#FF5A1F" stroke-width="2" filter="url(#shadow)"/>
<circle cx="788" cy="273" r="17" fill="#FF5A1F"/><text x="788" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">4</text>
<text x="814" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">局部重排</text>
<text x="845.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="845.0" dy="0">reschedule</tspan>
<tspan x="845.0" dy="25">变更权重 100</tspan>
</text>
<path d="M930,317 L982,317" fill="none" stroke="#202733" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="990" y="245" width="170" height="145" rx="14" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="2" filter="url(#shadow)"/>
<circle cx="1018" cy="273" r="17" fill="#FF5A1F"/><text x="1018" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">5</text>
<text x="1044" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">差异计算</text>
<text x="1075.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="1075.0" dy="0">before / after</tspan>
<tspan x="1075.0" dy="25">影响班级</tspan>
</text>
<path d="M1160,317 L1212,317" fill="none" stroke="#202733" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="1220" y="245" width="170" height="145" rx="14" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="2" filter="url(#shadow)"/>
<circle cx="1248" cy="273" r="17" fill="#FF5A1F"/><text x="1248" y="279" font-size="15" fill="white" font-weight="700" text-anchor="middle">6</text>
<text x="1274" y="282" font-size="20" fill="#202733" font-weight="700" text-anchor="start" class="">确认与通知</text>
<text x="1305.0" y="315" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="1305.0" dy="0">新课表 S&#x27;</tspan>
<tspan x="1305.0" dy="25">变更清单 Δ</tspan>
</text>
<rect x="310" y="500" width="820" height="150" rx="22" fill="#F6F8FB" stroke="#D9E0EA"/>
<text x="720" y="540" font-size="20" fill="#202733" font-weight="700" text-anchor="middle" class="">核心优化优先级</text>
<circle cx="390" cy="590" r="28" fill="#FF5A1F"/><text x="390" y="597" font-size="17" fill="white" font-weight="700" text-anchor="middle">P1</text>
<text x="432" y="597" font-size="17" fill="#202733" font-weight="600" text-anchor="start" class="">硬冲突 = 0</text>
<circle cx="620" cy="590" r="28" fill="#356AE6"/><text x="620" y="597" font-size="17" fill="white" font-weight="700" text-anchor="middle">P2</text>
<text x="662" y="597" font-size="17" fill="#202733" font-weight="600" text-anchor="start" class="">变更课次最少</text>
<circle cx="850" cy="590" r="28" fill="#20A875"/><text x="850" y="597" font-size="17" fill="white" font-weight="700" text-anchor="middle">P3</text>
<text x="892" y="597" font-size="17" fill="#202733" font-weight="600" text-anchor="start" class="">偏好与容量最优</text>
<rect x="475" y="700" width="490" height="74" rx="14" fill="#EAF8F3" stroke="#20A875" stroke-width="2"/>
<circle cx="503" cy="728" r="17" fill="#FF5A1F"/><text x="503" y="734" font-size="15" fill="white" font-weight="700" text-anchor="middle">90</text>
<text x="529" y="737" font-size="19" fill="#202733" font-weight="700" text-anchor="start" class="">典型结果</text>
<text x="720.0" y="770" font-size="17" fill="#667085" font-weight="400" text-anchor="middle">
<tspan x="720.0" dy="0">仅移动受影响课次，其他课程位置保持不变</tspan>
</text>
<text x="1370" y="865" text-anchor="end" font-size="14" fill="#98A2B3">ClassMind · 高途智能排课脑</text></svg>