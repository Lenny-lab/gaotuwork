name: classmind-tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: unittest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run unit + API integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s tests -v
      - name: Validate deployment entry point
        env:
          DEMO_LOGIN_ENABLED: "0"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          gunicorn --check-config app:app
          python -c "from app import app; response = app.test_client().get('/healthz'); assert response.status_code == 200"
